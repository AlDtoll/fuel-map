<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Где бензин — карта наличия топлива</title>
<meta name="description" content="Карта наличия топлива в реальном времени. Узнайте где есть бензин рядом с вами.">

<script type="text/javascript">(function(m,e,t,r,i,k,a){m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};m[i].l=1*new Date();for(var j=0;j<document.scripts.length;j++){if(document.scripts[j].src===r){return}}k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a)})(window,document,"script","https://mc.yandex.ru/metrika/tag.js","ym");ym(110271561,"init",{clickmap:true,trackLinks:true,accurateTrackBounce:true});</script><noscript><div><img src="https://mc.yandex.ru/watch/110271561" style="position:absolute;left:-9999px;" alt=""/></div></noscript>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
#map{position:absolute;top:0;bottom:0;left:0;right:0}
.topbar{position:absolute;top:0;left:0;right:0;z-index:1000;background:rgba(20,22,26,.92);
  color:#fff;padding:9px 14px;display:flex;align-items:center;gap:10px;backdrop-filter:blur(6px)}
.topbar b{font-size:15px}.topbar .city{color:#8a929c;font-size:12px;margin-left:auto;text-align:right;line-height:1.3}
.citybar{position:absolute;top:42px;left:0;right:0;z-index:999;display:flex;gap:6px;
  padding:7px 12px;overflow-x:auto;background:rgba(20,22,26,.82);backdrop-filter:blur(6px)}
.citybar button{flex:0 0 auto;background:#22252b;color:#cfe;border:1px solid #333a42;
  border-radius:16px;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.citybar button.on{background:#3ea37a;border-color:#3ea37a;color:#fff}
.fuelbar{position:absolute;top:84px;left:0;right:0;z-index:998;display:flex;gap:5px;align-items:center;
  padding:5px 12px;overflow-x:auto;background:rgba(20,22,26,.7);backdrop-filter:blur(4px)}
.fuelbar .lab{color:#6f767e;font-size:11px;flex:0 0 auto;margin-right:2px}
.fuelbar button{flex:0 0 auto;background:#22252b;color:#cfe;border:1px solid #333a42;
  border-radius:13px;padding:4px 11px;font-size:12px;cursor:pointer;white-space:nowrap}
.fuelbar button.on{background:#3ea37a;border-color:#3ea37a;color:#fff}
.legend{position:absolute;bottom:88px;left:12px;z-index:1000;background:rgba(20,22,26,.92);
  color:#fff;border-radius:10px;padding:9px 11px;font-size:12.5px;line-height:1.75}
.legend i{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:7px;vertical-align:middle}
.fab{position:absolute;bottom:24px;right:16px;z-index:1000;background:#3ea37a;color:#fff;border:none;
  width:54px;height:54px;border-radius:50%;font-size:24px;box-shadow:0 6px 18px rgba(0,0,0,.4)}
.pop b{font-size:14px}.pop .cur{font-size:12px;margin-top:3px}
.pop .fresh{font-size:11px;color:#7a818b;margin-top:6px}
.pop .warn{font-size:11px;color:#e0a33a;margin-top:5px}
.pop .chips{margin:7px 0 4px}
.pop .chip{display:inline-block;background:#2a2e35;color:#cfe;border-radius:6px;padding:2px 7px;font-size:11px;margin:2px 3px 0 0}
.pop .lbl{font-size:11px;color:#888;margin-top:9px}
.pop .rep{display:flex;gap:6px;margin-top:6px}
.pop .rep button{flex:1;border:none;border-radius:7px;padding:7px 4px;font-size:12px;font-weight:700;color:#fff;cursor:pointer}
.pop .yes{background:#2e9e5b}.pop .queue{background:#d99423}.pop .no{background:#d2433a}
.pop .fuelsel{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.pop .fuelsel button{border:1px solid #3a4049;background:#22252b;color:#cfe;border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer}
.pop .fuelsel button.on{background:#3ea37a;border-color:#3ea37a;color:#fff}
.badge{font-size:10px;padding:1px 6px;border-radius:6px;color:#fff}
</style>
</head>
<body>
<div class="topbar"><b>⛽ Есть Бензин</b><span class="city" id="city">…</span></div>
<div class="citybar" id="citybar"></div>
<div class="fuelbar" id="fuelbar"><span class="lab">топливо:</span></div>
<div id="map"></div>
<div class="legend">
  <div><i style="background:#2e9e5b"></i>есть</div>
  <div><i style="background:#d99423"></i>очередь / частично</div>
  <div><i style="background:#d2433a"></i>нет</div>
  <div><i style="background:#9aa0a6"></i>нет данных</div>
</div>
<button class="fab" onclick="locate()" title="Где я">📍</button>

<script>
const FRESH_MS = 3*60*60*1000;
const FUELS = ['92','95','98','100','ДТ','Газ'];
const RKEY = 'fuelmap_reports_v2';
let reports = load();          // локальные отметки (Phase A): {id:{status, fuels:[], ts}}
let DATA=null, layer=null, selFuel={}, CITY=null, GRADE='Все';
const CKEY='fuelmap_city';
const GRADES=['Все','95','92','98','100','ДТ'];

try{ if(window.Telegram&&Telegram.WebApp){Telegram.WebApp.expand();Telegram.WebApp.ready();} }catch(e){}
function load(){ try{return JSON.parse(localStorage.getItem(RKEY))||{}}catch(e){return {}} }
function save(){ localStorage.setItem(RKEY, JSON.stringify(reports)); }
function fresh(r){ return r && (Date.now()-r.ts)<FRESH_MS; }

// эффективный статус точки: свежий локальный отчёт > статус из засева gdebenz
function effStatus(s){
  const r=reports[s.id];
  if(fresh(r)) return r.status;
  return s.status;            // 'yes'|'no'|'queue'|null
}
function effFuels(s){
  const r=reports[s.id];
  if(fresh(r) && r.fuels && r.fuels.length) return r.fuels.join(',');
  return s.fuels_now||'';
}
function color(s){
  const st=effStatus(s);
  return st==='yes'?'#2e9e5b': st==='queue'?'#d99423': st==='no'?'#d2433a':'#9aa0a6';
}
function ago(ts){const m=Math.floor((Date.now()-ts)/60000);if(m<1)return'только что';if(m<60)return m+' мин назад';return Math.floor(m/60)+' ч назад';}
function stLabel(st){return st==='yes'?'есть':st==='queue'?'очередь':st==='no'?'нет':'нет данных';}

const map=L.map('map',{zoomControl:false,attributionControl:false});
L.control.zoom({position:'topright'}).addTo(map);
// 2ГИС-тайлы (детальнее для РФ). subdomains 0-3.
L.tileLayer('https://tile{s}.maps.2gis.com/tiles?x={x}&y={y}&z={z}&v=1.5',
  {subdomains:['0','1','2','3'],maxZoom:18}).addTo(map);

function popupHtml(s){
  const st=effStatus(s), fuels=effFuels(s);
  const r=reports[s.id];
  const cur = `<span class="badge" style="background:${color(s)}">${stLabel(st)}</span>` +
              (fresh(r)?` <span style="color:#888;font-size:11px">твоя отметка · ${ago(r.ts)}</span>`:'');
  const chips = fuels ? `<div class="chips">Сейчас: ${fuels.split(',').map(f=>`<span class="chip">${f}</span>`).join('')}</div>` : '';
  const sel = (selFuel[s.id]||[]);
  const fuelBtns = FUELS.map(f=>`<button class="${sel.indexOf(f)>=0?'on':''}" onclick="togF('${s.id}','${f}')">${f}</button>`).join('');
  const confl = s.conflict ? `<div class="warn">⚠️ Противоречивые отчёты — лучше уточнить</div>` : '';
  const fr = `<div class="fresh">🕒 данные ${updatedStr(DATA.updated).replace('обновлено ','')} · статусы быстро меняются, проверяйте на месте</div>`;
  return `<div class="pop"><b>${s.name}</b>${s.addr?' · '+s.addr:''}
    <div class="cur">${cur}</div>${chips}${confl}${fr}
    <div class="lbl">Отметить наличие (выбери топливо, если есть):</div>
    <div class="fuelsel">${fuelBtns}</div>
    <div class="rep">
      <button class="yes" onclick="rep('${s.id}','yes')">Есть</button>
      <button class="queue" onclick="rep('${s.id}','queue')">Очередь</button>
      <button class="no" onclick="rep('${s.id}','no')">Нет</button>
    </div></div>`;
}
window.togF=function(id,f){selFuel[id]=selFuel[id]||[];const i=selFuel[id].indexOf(f);i>=0?selFuel[id].splice(i,1):selFuel[id].push(f);const s=DATA.stations.find(x=>x.id===id);if(s&&s._m)s._m.setPopupContent(popupHtml(s));};
window.rep=function(id,status){
  reports[id]={status, fuels:(selFuel[id]||[]).slice(), ts:Date.now()}; save();
  const s=DATA.stations.find(x=>x.id===id);
  if(s&&s._m){s._m.setStyle({fillColor:color(s)});s._m.setPopupContent(popupHtml(s));}
  try{if(window.Telegram&&Telegram.WebApp&&Telegram.WebApp.HapticFeedback)Telegram.WebApp.HapticFeedback.impactOccurred('light');}catch(e){}
};

function cityStations(){ return DATA.stations.filter(s=>s.city===CITY); }
function visibleStations(){
  let ss=cityStations();
  if(GRADE!=='Все') ss=ss.filter(s=>effFuels(s).split(',').indexOf(GRADE)>=0);
  return ss;
}
function draw(){
  if(layer)layer.remove();
  layer=L.layerGroup().addTo(map);
  visibleStations().forEach(s=>{
    const m=L.circleMarker([s.lat,s.lon],{radius:8,weight:2,color:'#fff',fillColor:color(s),fillOpacity:1}).addTo(layer);
    m.bindPopup(()=>popupHtml(s),{maxWidth:290}); s._m=m;
  });
}
function updateStats(){
  const ss=visibleStations();
  const yes=ss.filter(s=>effStatus(s)==='yes').length, q=ss.filter(s=>effStatus(s)==='queue').length;
  const gtag=GRADE==='Все'?'':` · ${GRADE}`;
  document.getElementById('city').innerHTML=`${CITY}${gtag} · ${ss.length} АЗС · 🟢${yes} · 🟠${q}`+
    `<br><span style="font-size:11px;color:#6f767e">🕒 ${updatedStr(DATA.updated)}</span>`;
}
function setGrade(g){
  GRADE=g;
  document.querySelectorAll('#fuelbar button').forEach(b=>b.classList.toggle('on',b.dataset.g===g));
  draw(); updateStats();
}
function buildFuelBar(){
  const bar=document.getElementById('fuelbar');
  GRADES.forEach(g=>{
    const b=document.createElement('button'); b.textContent=g; b.dataset.g=g;
    if(g===GRADE)b.classList.add('on'); b.onclick=()=>setGrade(g); bar.appendChild(b);
  });
}
function setCity(name){
  CITY=name; try{localStorage.setItem(CKEY,name)}catch(e){}
  const c=(DATA.cities.find(x=>x.name===name)||{}).center;
  if(c) map.setView(c,12);
  document.querySelectorAll('#citybar button').forEach(b=>b.classList.toggle('on',b.dataset.city===name));
  draw(); updateStats();
}
function buildCityBar(){
  const bar=document.getElementById('citybar'); bar.innerHTML='';
  DATA.cities.forEach(c=>{
    const b=document.createElement('button'); b.textContent=c.name; b.dataset.city=c.name;
    b.onclick=()=>setCity(c.name); bar.appendChild(b);
  });
}
window.locate=function(){map.locate({setView:true,maxZoom:15});};
map.on('locationfound',e=>{L.circleMarker(e.latlng,{radius:7,color:'#2d8cff',fillColor:'#2d8cff',fillOpacity:.9}).addTo(map);});

function updatedStr(sec){
  if(!sec) return '';
  const m=Math.floor((Date.now()/1000-sec)/60);
  if(m<1) return 'обновлено только что';
  if(m<60) return 'обновлено '+m+' мин назад';
  const h=Math.floor(m/60); return 'обновлено '+h+' ч назад';
}
fetch('stations.json?v='+Date.now()).then(r=>r.json()).then(d=>{
  DATA=d;
  let saved=null; try{saved=localStorage.getItem(CKEY)}catch(e){}
  CITY=(saved && d.cities.some(c=>c.name===saved)) ? saved : (d.default_city||d.cities[0].name);
  buildCityBar(); buildFuelBar(); setCity(CITY);
});
</script>
</body>
</html>
